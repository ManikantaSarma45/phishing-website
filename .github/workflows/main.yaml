name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout code
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🐍 Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 🔧 Fix PYTHONPATH
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)/backend" >> $GITHUB_ENV

      # 📦 Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 🔁 Run ML Pipeline
      - name: Run ML Pipeline
        run: |
          python backend/pipeline/pipeline.py

      # ✅ Verify model exists
      - name: Verify model file
        run: |
          if [ ! -f backend/models/model_v1.pkl ]; then
            echo "Model file missing!"
            exit 1
          fi

      # 🔐 Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🐳 Build and Push Docker Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/phishing-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/phishing-api:${{ github.sha }}

      # 🚀 Run container (for testing)
      - name: Run container
        run: |
          docker run -d -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/phishing-api:latest

      # ⏳ Wait for API
      - name: Wait for API
        run: |
          for i in {1..10}; do
            if curl -s http://localhost:8000/docs > /dev/null; then
              echo "API is up"
              break
            fi
            sleep 2
          done

      # 🔍 Test API
      - name: Test API
        run: |
          curl -f -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"url": "http://www.google.com/"}'
